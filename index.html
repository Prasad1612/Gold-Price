<!DOCTYPE html>
<html>
<head>
  <title>Live Gold Price Dashboard</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; }
    .card { background:#1e1e1e; padding:15px; margin:10px; border-radius:8px; }
    h2 { color:#00ffaa; }
  </style>

<body>

<h1>International Gold – INR Tracker</h1>
<div id="data"></div>

<script>

  .then(res => res.json())
  .then(d => {
    document.getElementById("data").innerHTML = `
      <div class="card">
        <h2>Updated: ${d.time}</h2>
        <p>XAUUSD: $${d.xauusd}</p>
        <p>USDINR: ₹${d.usdinr}</p>
        <p>Base INR / gram: ₹${d.baseInrGram}</p>
        <hr>
        <p>24K Retail: ₹${d.retail24k} | Market: ₹${d.last24k} | Diff: ₹${d.diff24k}</p>
        <p>22K Retail: ₹${d.retail22k} | Market: ₹${d.last22k} | Diff: ₹${d.diff22k}</p>
      </div>`;
  });
</script>

</body>
</html>
