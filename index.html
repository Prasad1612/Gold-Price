<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Gold Price - India (₹)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0f17 0%, #131327 100%);
      color: #e0e0ff;
      min-height: 100vh;
      padding: 20px 15px;
      background-attachment: fixed;
    }

    .container {
      max-width: 580px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 2.1rem;
      font-weight: 700;
      background: linear-gradient(90deg, #00ffaa, #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
    }

    .last-update {
      color: #00ffaa;
      font-weight: 500;
      font-size: 1.1rem;
      margin-bottom: 1.8rem;
    }

    .card {
      background: rgba(30, 30, 46, 0.75);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 255, 200, 0.12);
      border-radius: 16px;
      padding: 1.8rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
      margin-bottom: 1.5rem;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .price-row:last-child {
      border-bottom: none;
    }

    .label {
      color: #a0a0ff;
      font-size: 0.95rem;
      font-weight: 400;
    }

    .value {
      font-size: 1.35rem;
      font-weight: 600;
      color: #ffffff;
    }

    .highlight {
      color: #00ffaa;
      font-weight: 700;
    }

    .diff-positive {
      color: #ff6b6b;
      font-weight: 500;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1.2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(0, 255, 170, 0.18);
    }

    .title-section {
      font-size: 1.4rem;
      font-weight: 600;
      color: #00ffaa;
    }

    .xau-section {
      text-align: right;
      color: #a0d4ff;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.8rem; }
      .value { font-size: 1.2rem; }
      .card { padding: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>International Gold – INR</h1>
    <div class="last-update" id="updateTime">Loading latest prices...</div>
  </header>

  <div class="card" id="mainCard">
    <div class="header-row">
      <div class="title-section">International Rates</div>
      <div class="xau-section" id="xauSection"></div>
    </div>

    <div class="price-row">
      <div class="label">Base Price (24K per gram)</div>
      <div class="value highlight" id="baseGram">—</div>
    </div>

    <div class="price-row">
      <div class="label">24K Retail</div>
      <div class="value" id="retail24k">—</div>
    </div>

    <div class="price-row">
      <div class="label">24K Market</div>
      <div class="value" id="market24k">—</div>
    </div>

    <div class="price-row">
      <div class="label">24K Difference</div>
      <div class="value diff-positive" id="diff24k">—</div>
    </div>

    <div class="price-row">
      <div class="label">22K Retail</div>
      <div class="value" id="retail22k">—</div>
    </div>

    <div class="price-row">
      <div class="label">22K Market</div>
      <div class="value" id="market22k">—</div>
    </div>

    <div class="price-row">
      <div class="label">22K Difference</div>
      <div class="value diff-positive" id="diff22k">—</div>
    </div>
  </div>

  <div class="card" style="text-align:center; font-size:0.9rem; color:#777; padding:1rem;">
    Last updated: <span id="updateTimeBottom">loading...</span> • Data from international markets + local reference
  </div>
</div>

<script>
fetch("https://script.googleusercontent.com/macros/echo?user_content_key=AehSKLgO9hICyOfoPV2fVufy4TE3KxqYx4Y7Wlu4Koex11fRAPfUod1n7u36ikwKF-ucGNWMa0-VEqAtwx6Cs8dvc7djk4T3DFRS-x7xB0ORI9LFCUQ8qP6DCzUtejb9X0C2gHxOfTcaUSqvZMDdZF6FOyAVZ4iK_SbLA9ernqlCH-QLPhgI8XPVQdg3AwyVn5TSyg92zhEJzVtRq0JImLMOevtLDhJW6Rkk3n6J5pwt-epTKhQbA1LhHTojxTuA-neQ5UEvBOxEFlhV5i2N3mluN8q4sx8ehA&lib=MGojfogA9ghirZ0wsR_Oq2NDoIZ1hlD_h")
  .then(res => res.json())
  .then(d => {
    const timeEl = document.getElementById("updateTime");
    const timeBottom = document.getElementById("updateTimeBottom");

    timeEl.textContent = d.time || "—";
    timeBottom.textContent = d.time || "—";

    document.getElementById("xauSection").innerHTML = `
      XAUUSD: <span class="highlight">$${Number(d.xauusd||0).toLocaleString()}</span><br>
      USDINR: <span class="highlight">₹${Number(d.usdinr||0).toFixed(3)}</span>
    `;

    document.getElementById("baseGram").textContent     = "₹" + Number(d.baseInrGram||0).toLocaleString();
    document.getElementById("retail24k").textContent   = "₹" + Number(d.retail24k||0).toLocaleString();
    document.getElementById("market24k").textContent   = "₹" + Number(d.last24k||0).toLocaleString();
    document.getElementById("diff24k").textContent     = "₹" + Number(d.diff24k||0).toLocaleString();

    document.getElementById("retail22k").textContent   = "₹" + Number(d.retail22k||0).toLocaleString();
    document.getElementById("market22k").textContent   = "₹" + Number(d.last22k||0).toLocaleString();
    document.getElementById("diff22k").textContent     = "₹" + Number(d.diff22k||0).toLocaleString();
  })
  .catch(err => {
    document.getElementById("updateTime").textContent = "Error loading data";
    console.error(err);
  });
</script>
</body>
</html>
